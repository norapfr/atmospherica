name: Generar cuadro diario

on:
  schedule:
    - cron: '0 6 * * *'    # 8h Madrid (UTC+2)
    - cron: '0 10 * * *'   # 12h Madrid (UTC+2)
    - cron: '0 18 * * *'   # 20h Madrid (UTC+2)
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      TZ: Europe/Madrid

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt playwright
          playwright install chromium

      - name: Generar cuadro
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        run: python main.py --headless

      - name: Copiar imágenes a docs
        run: |
          mkdir -p docs/output
          cp -r output/* docs/output/

      - name: Commit historia + cuadro nuevo
        run: |
          git config user.name  "atmospherica-bot"
          git config user.email "bot@atmospherica"
          git add data/ output/ docs/
          git diff --staged --quiet || git commit -m "paint $(TZ=Europe/Madrid date +%Y-%m-%d\ %H:%M)"
          git push