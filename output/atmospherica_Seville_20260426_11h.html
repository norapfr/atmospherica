<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>ATMOSPHERICA</title>

<style>
  * {{ margin:0; padding:0; box-sizing:border-box; }}

  body {{
    background:#06060a;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    font-family:'Courier New', monospace;
    overflow:hidden;
  }}

  /* KANDINSKY GRID */
  body::before {{
    content:"";
    position:fixed;
    inset:0;
    background:
      linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 50px 50px;
    pointer-events:none;
    mix-blend-mode:overlay;
  }}

  #topbar {{
    width:900px;
    max-width:calc(100vw - 32px);
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
  }}

  #title {{
    font-size:11px;
    color:#8a8a8a;
    letter-spacing:0.2em;
  }}

  #meta {{
    font-size:9px;
    color:#444;
    letter-spacing:0.12em;
    line-height:1.8;
  }}

  #progress {{
    font-size:9px;
    color:#222;
  }}

  #wrap {{
    position:relative;
    box-shadow:0 0 80px rgba(0,0,0,0.7);
    border:1px solid #101018;
  }}

  canvas {{
    display:block;
  }}

  #legend {{
    margin-top:14px;
    width:900px;
    color:#555;
    font-size:9px;
  }}

  #save {{
    padding:7px 18px;
    background:transparent;
    border:1px solid #222;
    color:#666;
    cursor:pointer;
    letter-spacing:0.15em;
  }}

  #save:hover {{
    border-color:#777;
    color:#aaa;
  }}
</style>
</head>

<body>

<div id="topbar">
  <div>
    <div id="title"></div>
    <div id="meta"></div>
    <div id="progress">cargando...</div>
  </div>

  <button id="save" onclick="saveImg()">SAVE</button>
</div>

<div id="wrap"></div>
<div id="legend"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>

<script>

const C = {"city": "Seville", "date": "2026-04-26", "temp_c": 20.52, "wind_speed": 4.92, "pm25": 3.05, "temp_norm": 0.44608695652173913, "wind_energy": 0.246, "humidity_norm": 0.7375};

const W = 900;
const H = 1100;

function saveImg() {{
  const canvas = document.querySelector('canvas');
  const tmp = document.createElement('canvas');

  tmp.width = canvas.width;
  tmp.height = canvas.height;

  const ctx = tmp.getContext('2d');
  ctx.fillStyle = '#06060a';
  ctx.fillRect(0,0,tmp.width,tmp.height);
  ctx.drawImage(canvas,0,0);

  tmp.toBlob(blob => {{
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.download = `atmospherica_${{C.city}}_${{C.date}}.png`;
    a.href = url;
    a.click();
  }});
}}

new p5(sk => {{

  sk.setup = function() {{
    let cnv = sk.createCanvas(W,H);
    cnv.parent('wrap');

    sk.colorMode(sk.HSB,360,100,100,100);
    sk.noLoop();

    renderMeta();
    drawKandinsky();
  }};

  function drawKandinsky() {{
    sk.background(0);

    const t = C.temp_norm;
    const w = C.wind_energy;
    const h = C.humidity_norm;

    const palette = [
      [randomHue(t), 80, 90],
      [randomHue(t+0.3), 70, 80],
      [randomHue(t+0.6), 90, 70]
    ];

    for(let i=0;i<260;i++) {{
      const x = sk.random(W);
      const y = sk.random(H);

      const type = Math.floor(sk.random(5));

      const col = palette[Math.floor(sk.random(palette.length))];

      sk.noStroke();
      sk.fill(col[0], col[1], col[2], sk.random(20,80));

      const size = sk.random(10,80);

      sk.push();
      sk.translate(x,y);
      sk.rotate(sk.random(sk.TWO_PI));

      if(type===0) {{
        sk.rect(0,0,size,size*sk.random(0.5,2));
      }}
      if(type===1) {{
        sk.ellipse(0,0,size,size);
      }}
      if(type===2) {{
        triangle(size);
      }}
      if(type===3) {{
        lineGesture(size);
      }}
      if(type===4) {{
        sk.beginShape();
        for(let j=0;j<4;j++) {{
          sk.vertex(sk.random(-size,size), sk.random(-size,size));
        }}
        sk.endShape(sk.CLOSE);
      }}

      sk.pop();
    }}

    document.getElementById("progress").innerText = "ready";
  }}

  function triangle(size) {{
    sk.triangle(0,-size,size,size,-size,size);
  }}

  function lineGesture(size) {{
    sk.stroke(0,0,100,40);
    sk.strokeWeight(sk.random(1,3));
    sk.line(-size,0,size,0);
  }}

  function randomHue(t) {{
    return (t*360 + sk.random(-40,40) + 360) % 360;
  }}

  function renderMeta() {{
    document.getElementById("title").innerText =
      `ATMOSPHERICA · ${C.city} · ${C.date}`;

    document.getElementById("meta").innerText =
      `${C.temp_c}°C · ${C.wind_speed} m/s · PM2.5 ${C.pm25}`;
  }}

}});

</script>

</body>
</html>
